syntax = "proto3";

import "scalapb/scalapb.proto";

package com.thesamet.proto.e2e;

option (scalapb.options) = {
  lazy_string_fields: true
};

message LazyMessage {
  string str = 1;
  int32 int = 2;
}

message NotLazyMessage {
  option (scalapb.message) = {
    lazy_string_fields: false
  };
  string not_lazy_string = 1;
}

message LazyRepeated {
  repeated string items = 1;
}

message LazyDictionary {
  map<string, int32> string_to_int = 1;
  map<int32, string> int_to_string = 2;
}

message LazyWithRecursion {
  string data = 1;
  LazyWithRecursion nested = 2;
}
